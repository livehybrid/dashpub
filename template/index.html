<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Splunk Dashboard</title>

    
    <!-- Splunk Theme CSS -->
    <link rel="stylesheet" href="/fonts/proxima-regular-webfont.woff" />
    <link rel="stylesheet" href="/fonts/proxima-semibold-webfont.woff" />
    <link rel="stylesheet" href="/fonts/proxima-bold-webfont.woff" />
    <link rel="stylesheet" href="/fonts/inconsolata-regular.woff" />
    <link rel="stylesheet" href="/fonts/splunkdatasans-regular.webfont.woff2" />
    <link rel="stylesheet" href="/fonts/splunkdatasans-semibold.webfont.woff2" />
    <link rel="stylesheet" href="/fonts/splunkdatasans-bold.webfont.woff2" />
    
    <style>
      html, body {
        margin: 0;
        padding: 0;
        font-family: 'Splunk Platform Sans';
      }
      
      @font-face {
        font-family: 'Splunk Platform Sans';
        src: url('/fonts/proxima-regular-webfont.woff') format('woff');
        font-style: normal;
        font-weight: normal;
      }
      
      @font-face {
        font-family: 'Splunk Platform Sans';
        src: url('/fonts/proxima-semibold-webfont.woff') format('woff');
        font-style: normal;
        font-weight: 500;
      }
      
      @font-face {
        font-family: 'Splunk Platform Sans';
        src: url('/fonts/proxima-bold-webfont.woff') format('woff');
        font-style: normal;
        font-weight: 700;
      }
      
      @font-face {
        font-family: 'Splunk Platform Mono';
        src: url('/fonts/inconsolata-regular.woff') format('woff');
        font-style: normal;
        font-weight: normal;
      }
      
      @font-face {
        font-family: 'Splunk Data Sans';
        src: url('/fonts/splunkdatasans-regular.woff2') format('woff2');
        font-style: normal;
        font-weight: normal;
      }
      
      @font-face {
        font-family: 'Splunk Data Sans';
        src: url('/fonts/splunkdatasans-semibold.woff2') format('woff2');
        font-style: normal;
        font-weight: 500;
      }
      
      @font-face {
        font-family: 'Splunk Data Sans';
        src: url('/fonts/splunkdatasans-bold.woff2') format('woff2');
        font-style: normal;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Default display locale. en-GB => 24-hour time (HH:mm) + DD/MM/YYYY dates.
      // This sets the locale SOURCE; the actual time/date formatting in Splunk
      // visualizations is driven by the window.format_time/_date/_datetime
      // globals seeded from this value in src/i18nBootstrap.js (Splunk charts
      // read those globals, NOT window.$C.LOCALE directly). $C.LOCALE is also
      // read once by @splunk/splunk-utils/config, so set it before the module
      // bundle below.
      // Override at build/dev time without editing this file by setting the
      // DASHPUB_LOCALE env var (e.g. DASHPUB_LOCALE=en-US) — see vite.config.js.
      window.$C = window.$C || {};
      window.$C.LOCALE = 'en-GB';
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
